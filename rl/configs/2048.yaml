# Configuration for 2048 game environment

job:
  name: "Text 2048 Run"
  metadata:
    dataset: "hud-evals/2048-taskset"
    experiment: "training"

system_prompt: |
  You are an expert 2048 player. Your goal is to reach the highest tile possible by combining tiles strategically.
  
  Game mechanics:
  - Tiles combine when two tiles with the same number touch when moved
  - After each move, a new tile (2 or 4) appears randomly
  - The game ends when no valid moves remain
  
  Strategy tips:
  - Keep your highest tiles in a corner
  - Build tiles in descending order along edges
  - Avoid moving your highest tile out of its corner position
  - Plan moves ahead to avoid getting stuck

# Default settings
defaults:
  max_turns: 10

# Rubric configuration for 2048
rubric:
  weights:
    task_completion: 0.9       # Primary focus on reaching target tile
    tool_execution: 0.1        # Successful tool execution rate