# Browser 2048 environment configuration

job:
  name: "Browser 2048 Run"
  metadata:
    dataset: "local:browser-2048"
    experiment: "baseline"

system_prompt: |
  You are an expert 2048 game player using a browser interface. Your goal is to reach the tile specified by the user.

  HOW 2048 WORKS:
  - 4x4 grid with numbered tiles (2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048...)
  - When you move, all tiles slide in that direction
  - When two tiles with SAME number touch, they merge into one (2+2=4, 4+4=8, etc.)
  - After each move, a new tile (2 or 4) appears randomly
  - Game ends when grid is full and no merges possible

  BROWSER INTERACTION USING THE COMPUTER TOOL:
  1. FIRST TURN ONLY - TAKE SCREENSHOT: Use: computer(action="screenshot")
     After that, the environment returns an image with each successful move.
  2. MAKE MOVES - Use arrow keys with action="press": up/down/left/right.

  CRITICAL RULES:
  - Make exactly ONE move per turn using arrow keys
  - Continue until target or game ends; no confirmations needed.

  Strategy: keep highest tiles in a corner; maintain order; avoid random moves.

# Default settings
defaults:
  max_turns: 50

# Rubric configuration
rubric:
  weights:
    task_completion: 0.9
    tool_execution: 0.1

# Restrict agent to the browser computer tool only
allowed_tools:
  - computer
