name: Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Fail before anything is built or published if pyproject.toml,
      # shim/pyproject.toml, or hud/version.py disagree on the version.
      - name: Verify the hud-python shim is in lockstep with hud
        run: uv run --no-project --python 3.12 scripts/check_shim_lockstep.py

      - name: Build and publish 'hud' to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish

      # 'hud-python' is an empty shim that depends on 'hud' (the package was
      # renamed). Published in lockstep so old install commands keep working.
      - name: Build and publish 'hud-python' shim to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build shim
          uv publish shim/dist/*
