name: Security

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

jobs:
  bandit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run Bandit security linter
        run: |
          # TODO: Later, make Bandit findings fail CI on main instead of ignoring them.
          uv run --with bandit bandit -r hud/ \
            -c pyproject.toml \
            --format json \
            --output bandit-report.json \
            || true
          uv run --with bandit bandit -r hud/ \
            -c pyproject.toml \
            --format screen \
            || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: semgrep/semgrep:1.90.0
    env:
      SEMGREP_RULES: >-
        p/python
        p/security-audit
        p/command-injection
        p/secrets
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        # TODO: Later, remove `|| true` (at least on main) so important Semgrep findings can block merges.
        run: |
          CONFIG_ARGS=""
          for config in $SEMGREP_RULES; do
            CONFIG_ARGS="$CONFIG_ARGS --config $config"
          done

          # Prints results to stdout (text) and also writes JSON for artifacts.
          semgrep scan $CONFIG_ARGS --json-output semgrep-report.json || true

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
